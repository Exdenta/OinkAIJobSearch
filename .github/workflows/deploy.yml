# GitHub Actions workflow — Hetzner deploy.
#
# Gated on the repository VARIABLE `HETZNER_DEPLOY_ENABLED` so the
# workflow can live in the repo before a server exists: until you set the
# variable, every run skips instantly (no red ✗ spam on pushes).
#
# To enable (Settings → Secrets and variables → Actions):
#   Variables:
#     HETZNER_DEPLOY_ENABLED  "true"
#   Secrets:
#     HETZNER_HOST     Hostname or IP of the server (e.g. oink.example.com)
#     HETZNER_SSH_KEY  Private ED25519 key whose public half is in the
#                      `deploy` user's ~/.ssh/authorized_keys on the server.
#                      Generate locally with:
#                        ssh-keygen -t ed25519 -C "github-deploy" -f oink_deploy
#                      Put oink_deploy.pub on the server, paste oink_deploy
#                      into the GH secret. Never commit either.

name: Deploy to Hetzner

on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Serialize deploys — never let two pushes race.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ vars.HETZNER_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run deploy.sh
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          chmod +x deploy/deploy.sh
          deploy/deploy.sh "$HOST"
